<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>mind-expander</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1e293b;
        overflow: hidden;
      }
      main {
        position: absolute;
        inset: 0;
        /* Horizontal split: diagram pane on the left, code panel on
           the right when open. The code panel is a flex sibling, not
           an overlay, so the diagram's viewport (`#canvas-scroll`)
           naturally shrinks when the panel opens and expands when it
           closes — no z-index stacking, no overlap. */
        display: flex;
        flex-direction: row;
        overflow: hidden;
      }
      /* Left pane wrapping the diagram. Flex-1 so it grows to take all
         the space the code panel isn't using; `min-width: 0` lets it
         shrink below its content's natural width when the panel opens
         wide. `position: relative` so the absolute-positioned
         scroll viewport / recenter button inside still anchor here. */
      #viewer-left {
        flex: 1 1 auto;
        position: relative;
        min-width: 0;
        overflow: hidden;
      }
      /* Scroll viewport. Native browser scrollTop is the source of truth
         for vertical position — `position: sticky` on the HTML module
         headers responds to it without any JS sticky simulation. d3.zoom
         still owns pan + zoom semantics; a one-line mirror in the zoom
         callback writes t.y/t.x to scrollTop/scrollLeft so the scroll
         container stays in sync. Scrollbars hidden so the user can't
         drag them and desync — all pan input flows through d3.zoom. */
      #canvas-scroll {
        position: absolute;
        inset: 0;
        /* Only vertical scroll is native — that's what `position:
           sticky` needs to engage. Horizontal pan is owned entirely by
           d3.zoom's tx (applied to the SVG transform); a horizontal
           scrollbar would race with that. */
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
      }
      /* "Back to content" indicator — appears when the user has
         over-scrolled (or panned via SVG-tx) far enough that no part of
         the diagram is in the viewport. One click resets translations
         (preserving zoom level). Hidden by default; main.ts toggles the
         `hidden` attribute based on the visibility check. */
      #recenter-btn {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        color: #1e293b;
        cursor: pointer;
      }
      #recenter-btn:hover {
        background: #f8fafc;
        border-color: #94a3b8;
      }
      #recenter-btn:active {
        background: #f1f5f9;
      }
      #recenter-btn[hidden] {
        display: none;
      }
      .recenter-icon {
        font-size: 15px;
        line-height: 1;
      }
      /* Right-side docked code panel. Sits as a flex sibling of
         `#viewer-left` inside `<main>`, so its width is taken out of
         the diagram pane's available space. Width is user-resizable
         via the left-edge splitter (`.code-panel-resize-l`) and
         persisted to localStorage. Content area is a monospace pre
         with line gutters; the highlighted span paints a soft yellow
         background, and clicking any line fires the host's
         line-navigate callback. */
      #code-panel {
        position: relative;
        flex: 0 0 var(--code-panel-w, 480px);
        width: var(--code-panel-w, 480px);
        height: 100%;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        border-left: 1px solid #cbd5e1;
        overflow: hidden;
        min-width: 280px;
      }
      #code-panel[hidden] {
        display: none;
      }
      .code-panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        user-select: none;
        flex: 0 0 auto;
      }
      .code-panel-title {
        flex: 1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #475569;
        white-space: nowrap;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 2px;
        min-width: 0;
        cursor: default;
      }
      .code-panel-crumb {
        background: transparent;
        border: none;
        padding: 1px 4px;
        margin: 0;
        color: inherit;
        font: inherit;
        cursor: pointer;
        border-radius: 3px;
        white-space: nowrap;
        flex-shrink: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .code-panel-crumb:hover {
        background: #e2e8f0;
      }
      .code-panel-crumb.is-file {
        color: #1e293b;
        cursor: default;
      }
      .code-panel-crumb.is-file:hover {
        background: transparent;
      }
      .code-panel-crumb-sep {
        color: #94a3b8;
        flex: 0 0 auto;
        padding: 0 2px;
      }
      /* Floating breadcrumb popup: list of folders + files inside the
         clicked segment. Lives in document.body so it can overflow the
         panel boundaries when needed. */
      .code-panel-breadcrumb-popup {
        position: fixed;
        z-index: 2000;
        min-width: 180px;
        max-height: 60vh;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        padding: 4px 0;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #1e293b;
      }
      .code-panel-breadcrumb-popup-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        cursor: pointer;
        white-space: nowrap;
      }
      .code-panel-breadcrumb-popup-row:hover {
        background: #f1f5f9;
      }
      .code-panel-breadcrumb-popup-row.is-current {
        background: #ede9fe;
      }
      /* Tree chevron: same VS Code-style `›` glyph the left module
         tree uses, rotated 90° when the folder is expanded. Files get
         the slot but render no glyph so all rows align. */
      .code-panel-breadcrumb-popup-chevron {
        display: inline-block;
        flex: 0 0 12px;
        width: 12px;
        text-align: center;
        color: #94a3b8;
        font-weight: 600;
        transition: transform 80ms ease;
      }
      .code-panel-breadcrumb-popup-chevron.open {
        transform: rotate(90deg);
      }
      .code-panel-breadcrumb-popup-chevron.is-file {
        color: transparent;
      }
      .code-panel-breadcrumb-popup-empty {
        padding: 6px 10px;
        color: #94a3b8;
        font-style: italic;
      }
      .code-panel-close {
        flex: 0 0 auto;
        background: transparent;
        border: none;
        font-size: 20px;
        line-height: 1;
        color: #64748b;
        cursor: pointer;
        padding: 0 4px;
      }
      .code-panel-close:hover {
        color: #0f172a;
      }
      .code-panel-body {
        flex: 1 1 auto;
        margin: 0;
        padding: 8px 0;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
        background: #ffffff;
        color: #1e293b;
        cursor: default;
      }
      .code-panel-line {
        display: flex;
        gap: 12px;
        padding: 0 12px;
        white-space: pre;
      }
      .code-panel-line:hover {
        background: #f1f5f9;
      }
      .code-panel-line.highlight {
        background: #e3edfd; /* shallow blue */
      }
      .code-panel-line.highlight:hover {
        background: #d1e0fb;
      }
      .code-panel-gutter {
        flex: 0 0 auto;
        width: 3em;
        text-align: right;
        color: #94a3b8;
        user-select: none;
      }
      .code-panel-text {
        flex: 1 1 auto;
        white-space: pre;
      }
      .code-panel-loading,
      .code-panel-error {
        padding: 16px;
        color: #64748b;
        font-style: italic;
      }
      .code-panel-error {
        color: #b91c1c;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        white-space: pre-wrap;
      }
      /* Splitter between the diagram pane and the code panel. Sits on
         the panel's left edge; dragging it left/right adjusts the
         panel's width and reflows the flex layout so the diagram
         pane resizes live. Slightly wider hit area (8px) than the
         old edge handle since this is now the panel's only resize
         control. */
      .code-panel-resize {
        position: absolute;
        background: transparent;
      }
      .code-panel-resize-l {
        left: -4px;
        top: 0;
        bottom: 0;
        width: 8px;
        cursor: ew-resize;
        z-index: 1;
      }
      #canvas-scroll::-webkit-scrollbar {
        display: none;
      }
      /* Sized per-draw to (totalWidth*k, totalHeight*k) so the scroll
         range matches the diagram's data extent at the current zoom. */
      #canvas-content {
        position: relative;
        /* JS overrides height to `totalHeight * k` per draw so native
           scroll has a real range. Width stays at 100% — horizontal pan
           lives in d3.zoom's tx, so canvas-content never needs to be
           wider than the viewport. */
        width: 100%;
        height: 100%;
      }
      /* Scoped to the main tree SVG only — without this, the legend's
         inline SVGs (and the hidden defs-only SVG) would inherit
         width:100%/height:100% and balloon to fill their containers. */
      #tree {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        cursor: default;
        user-select: none;
      }
      /* HTML overlay holding the module tree. Sits ABOVE the SVG so its
         rows catch clicks and so native `position: sticky` works against
         the canvas-scroll viewport. The container itself does not catch
         pointer events — only the rows inside — so SVG content under
         the empty space (left margin) remains clickable. */
      #html-modules {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #html-modules .module-group {
        position: absolute;
        left: 0;
      }
      /* Indent guide for expanded modules: a thin vertical line that
         drops from the chevron through the entire descendant block,
         ending just before the next sibling at the same depth. The
         group's own bottom already lands there, so the line just runs
         to `bottom: 0`. Custom properties (set inline per row, scaled
         with zoom) place the line on the chevron's centerline. */
      #html-modules .module-group.is-expanded::before {
        content: '';
        position: absolute;
        left: var(--guide-x, 7px);
        top: var(--guide-top, 22px);
        bottom: 0;
        width: 1px;
        background: #cbd5e1;
        pointer-events: none;
        opacity: var(--guide-opacity, 1);
      }
      #html-modules .module-header {
        position: sticky;
        /* Background lives on .module-header-bg (a wider child) so the
           opaque coverage spans the full module-column width, not just
           the row's chip extent. */
        display: flex;
        align-items: center;
        pointer-events: auto;
        cursor: pointer;
        z-index: 1;
        box-sizing: border-box;
        /* Let the chip overflow rightward if the measured width is a
           hair short — important for crate-tier rows whose chip renders
           at font-size 15 while the canvas measurer uses 14. */
        overflow: visible;
        white-space: nowrap;
        /* Text halo: a white outline behind every glyph so the labels
           stay legible when arrows or canvas content pan past behind
           the (sometimes transparent) module-header background. Same
           role as the `paint-order: stroke` halo on SVG text. */
        text-shadow:
          0 0 3px #ffffff,
          0 0 3px #ffffff,
          0 0 2px #ffffff,
          0 0 2px #ffffff;
      }
      #html-modules .module-header.crate-tier {
        /* Softer than full bold so the crate row reads as a section
           heading without shouting over the rest of the diagram. */
        font-weight: 600;
        color: #0f172a; /* slate-900 — dark but not pure black */
        letter-spacing: 0.01em;
      }

      #html-modules .module-chevron {
        display: inline-block;
        text-align: center;
        font-weight: 600;
        flex: 0 0 auto;
      }
      /* Neutral chevron — slate-400 so it reads as an affordance not an
         alert. Saturation belongs in the type/visibility chips, not in
         the tree navigation glyphs. */
      #html-modules .module-chevron.expand,
      #html-modules .module-chevron.collapse {
        color: #94a3b8;
      }
      #html-modules .module-chevron.empty {
        color: transparent;
      }
      #html-modules .module-chip {
        display: inline-flex;
        align-items: center;
        /* No background or border — legibility comes from the text
           halo on `.module-header`. Re-enable a chip backing here if
           the halo proves too weak over dense diagram areas. */
        color: #1e293b;
        white-space: nowrap;
        flex: 0 0 auto;
      }
      #tree.viewport-dragging,
      #tree.viewport-dragging:active {
        cursor: move;
      }
      /* Arrows render subdued by default so dense diagrams stay readable.
         Selection brings them forward via opacity and, for canonical arrows,
         color only. Width is reserved for hover so clicking a member does not
         make the route jump visually.
         path.visible carries the visual stroke; path.hit is a transparent
         wider sibling that catches clicks (see tree.ts). pointer-events
         is split so only .hit reacts — no double-fires. */
      #tree g.arrows path.visible {
        opacity: 0.7;
        pointer-events: none;
        transition:
          opacity 80ms,
          stroke-width 80ms;
      }
      #tree g.arrows path.visible.highlighted {
        opacity: 1;
      }
      /* Canonical ownership arrows are structural background. Keep them
         shallower at idle; selection still promotes them to full-opacity blue,
         while drift/re-export/call arrows keep their own emphasis. */
      #tree g.arrows path.visible.canonical:not(.call):not(.reexport):not(.highlighted) {
        opacity: 0.45;
      }
      /* Function-call arrows are opt-in context. The call layer only contains
         active hover/click routes, so every call arrow in the SVG should be
         visible and clickable. */
      #tree g.arrows path.visible.call {
        opacity: 1;
        stroke-width: 1.25;
      }
      #tree g.arrows path.visible.call.highlighted {
        opacity: 1;
      }
      #tree g.arrows path.hit {
        cursor: pointer;
      }
      /* Hover affordance: when the cursor is over an arrow's wide hit
         overlay, the whole arrow group is hovered. We override the
         stroke to a vivid purple (#a855f7, Tailwind purple-500) and
         bump weight so the hovered arrow pops out of whatever color
         it had before -- the previous "same color, slightly thicker"
         treatment was too easy to miss in dense routes. The kind
         dash pattern (call/reexport/cross-crate) still applies; only
         color and width change. The arrowhead marker uses
         context-stroke fill so it picks up the new color too. The
         chosen purple is distinct from the violet-600 (#7c3aed) used
         for the cross-crate accent on labels: same family, but
         brighter so a hovered cross-crate arrow doesn't blend into
         its own dash pattern. */
      #tree g.arrows g.arrow:hover path.visible {
        opacity: 1;
        stroke: #a855f7;
        stroke-width: 2;
        marker-end: url(#sf-arrow-hover);
      }
      #tree g.arrows g.arrow:hover path.visible.call {
        stroke-width: 2;
      }
      /* Canonical arrows are slate-500 grey by default (background context);
         when highlighted, use blue so "the chain I'm examining" stands out
         by colour, not by size. The arrowhead picks up the same colour via
         marker fill="context-stroke". */
      #tree g.arrows path.visible.canonical.highlighted {
        stroke: #3b82f6;
      }
      /* Tour focus on a specific arrow: gentle continuous pulse on the
         matching <g class="arrow"> so the user can see the relationship
         the bubble is talking about at a glance. Stroke jumps to a warm
         amber that matches the bubble's body, and the width breathes
         between 1.5 and 3.5 over a slow cycle. The hit path stays
         untouched (still transparent and wide for click detection). */
      @keyframes tour-arrow-pulse {
        0%   { stroke-width: 1.5; opacity: 0.85; }
        50%  { stroke-width: 3.5; opacity: 1; }
        100% { stroke-width: 1.5; opacity: 0.85; }
      }
      #tree g.arrows g.arrow.tour-highlight path.visible {
        stroke: #f59e0b;
        marker-end: url(#sf-arrow-hover);
        animation: tour-arrow-pulse 1.4s ease-in-out infinite;
      }
      #tree text.field-row {
        cursor: pointer;
      }
      #tree text.field-row:hover {
        font-weight: 600;
      }
      /* Halo: paint a strong white stroke under every glyph so arrow lines
         passing behind text appear to break around the letters instead of
         slicing through them. paint-order puts stroke under fill so the
         visible color is still the fill. */
      #tree text {
        paint-order: stroke fill;
        stroke: white;
        stroke-width: 4px;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      /* Module-label halo: thicker white stroke around the chevron and label
         glyphs so the floating text stays legible when it crosses arrows or
         type content. Applies on top of the global #tree text halo (4px). */
      #tree g.module-row text.name,
      #tree g.module-row text.chevron {
        stroke-width: 8px;
      }
      #top-controls {
        /* `absolute` (not `fixed`) so the cluster anchors to its
           containing block — `#viewer-left`. When the code panel opens
           and `#viewer-left` shrinks, the right edge of these controls
           tracks the splitter rather than running off behind the panel. */
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      /* Pointer-events shim. The cluster is a wide flex bbox (as wide
         as its widest child, e.g. the legend panel) but most of that
         area is whitespace or non-interactive decoration. Default to
         `none` so canvas pans / drags pass through the empty regions,
         then opt back in on the actual interactive elements. */
      #top-controls,
      #top-controls * {
        pointer-events: none;
      }
      #top-controls button,
      #top-controls input,
      #top-controls select,
      #top-controls .minimap-body,
      #top-controls .row {
        pointer-events: auto;
      }
      #crate {
        font-size: 12px;
        padding: 3px 6px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
      }
      /* Games-style keybinding hint, sits below the crate selector. */
      #keyhints {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #475569;
        user-select: none;
      }
      #keyhints .row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 2px 6px 2px 4px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        opacity: 0.85;
        cursor: pointer;
      }
      #keyhints .row:hover {
        opacity: 1;
        border-color: #cbd5e1;
      }
      #keyhints .row.active {
        background: #fef3c7;
        border-color: #f59e0b;
        color: #78350f;
        opacity: 1;
      }
      #keyhints kbd {
        display: inline-block;
        min-width: 14px;
        padding: 1px 5px;
        font-family: inherit;
        font-size: 10px;
        font-weight: 600;
        text-align: center;
        color: #1e293b;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-bottom-width: 2px;
        border-radius: 3px;
      }
      #keyhints .row.active kbd {
        background: #fde68a;
        border-color: #f59e0b;
        color: #78350f;
      }
      /* Wrapper for the F/S/R chips. Inside a column-flex container with
         default `align-items: stretch`, all rows take the cross-size of
         the widest child — so the three chips end up uniform-width
         (matching whichever has the longest label, currently "S scale 100%").
         Legend is a sibling of this wrapper, not a child, so it doesn't
         participate in the chip-width computation. */
      #keyhints .chips {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      /* Foldable toggle. Folded by default; click to expand. State is
         persisted in sessionStorage so it survives page reloads within
         the same tab session. */
      #keyhints .keyhints-toggle {
        align-self: flex-end;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        padding: 2px 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        cursor: pointer;
        line-height: 1.5;
      }
      #keyhints .keyhints-toggle:hover {
        background: #f8fafc;
        color: #1e293b;
      }
      #keyhints .keyhints-body {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      #keyhints .keyhints-body[hidden] {
        display: none;
      }
      #settings {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #475569;
        user-select: none;
      }
      #settings .settings-toggle {
        align-self: flex-end;
        width: 28px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        padding: 2px 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        font-weight: 700;
        color: #64748b;
        cursor: pointer;
        line-height: 1.5;
      }
      #settings .settings-toggle:hover {
        background: #f8fafc;
        color: #1e293b;
      }
      #settings .settings-body {
        width: 214px;
        padding: 8px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }
      #settings .settings-body[hidden] {
        display: none;
      }
      #settings .settings-row {
        display: flex;
        align-items: center;
        gap: 7px;
        cursor: pointer;
      }
      #settings .settings-row + .settings-row {
        margin-top: 6px;
      }
      #settings .settings-row input {
        margin: 0;
      }
      #settings .settings-summary {
        margin-top: 6px;
        color: #64748b;
        line-height: 1.35;
      }
      #settings .settings-default {
        margin-top: 4px;
        color: #94a3b8;
      }
      #minimap {
        width: 180px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        overflow: hidden;
        user-select: none;
      }
      #minimap[hidden] {
        display: none;
      }
      #minimap .minimap-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 4px 7px;
        background: transparent;
        border: none;
        border-bottom: 1px solid #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        font-weight: 600;
        color: #475569;
        cursor: pointer;
      }
      #minimap .minimap-toggle:hover {
        background: #f8fafc;
        color: #1e293b;
      }
      #minimap .minimap-caret {
        color: #94a3b8;
      }
      #minimap .minimap-body[hidden] {
        display: none;
      }
      #minimap .minimap-body {
        width: 180px;
        height: 132px;
      }
      #minimap svg {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
        touch-action: none;
      }
      #minimap .minimap-viewport {
        fill: rgba(59, 130, 246, 0.12);
        stroke: #2563eb;
        stroke-width: 1.5;
        vector-effect: non-scaling-stroke;
      }
      /* Arrow legend — same stroke / arrowhead / colors as the graph
         (see ensureArrowMarker in tree.ts). The marker referenced from
         the inline SVGs below uses fill=context-stroke so the arrowhead
         tracks each line's stroke color, matching the graph's behaviour. */
      #keyhints .legend {
        display: flex;
        gap: 12px;
        margin-bottom: 6px;
        padding: 6px 8px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #keyhints .legend .legend-col {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      #keyhints .legend .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #64748b;
        font-size: 10px;
      }
      #keyhints .legend .legend-arrow {
        display: block;
        flex-shrink: 0;
        width: 36px;
        height: 10px;
      }
      /* Visibility dots — same colors used for type/function dots in the
         graph. Matches view/encoding.ts:VISIBILITY_COLOR. */
      #keyhints .legend .legend-dot {
        flex-shrink: 0;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin: 0 14px 0 0;
      }
      .error {
        position: absolute;
        inset: 0;
        padding: 16px;
        color: #b91c1c;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        background: white;
      }
      /* Lightweight hover-only tooltip for type rows. Smaller and busier
         than the owners popover — just a read-only chip with quick info. */
      #type-tooltip {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border: 1px solid #e2e8f0;
        border-radius: 5px;
        padding: 6px 10px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1e293b;
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.1);
        max-width: 320px;
        font-size: 11px;
        line-height: 1.45;
      }
      #type-tooltip .tt-name {
        font-weight: 600;
        font-size: 12px;
        color: #1e293b;
      }
      #type-tooltip .tt-path {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #64748b;
        font-size: 10px;
        margin-top: 1px;
      }
      #type-tooltip .tt-meta {
        color: #475569;
        font-size: 11px;
        margin-top: 2px;
      }
      #type-tooltip .tt-meta + .tt-meta {
        margin-top: 0;
      }
      /* Call-target picker: floating rounded white panel with a thin
         border and subtle shadow. Rows are plain text — no chip per row,
         no per-glyph halo. The panel background does the obscuring; each
         row is just text+padding inside it. Bold means the row's call
         edge is currently revealed; click toggles. */
      .edge-picker-panel {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.25;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 6px 8px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      }
      .edge-picker-panel .edge-picker-row {
        cursor: pointer;
        padding: 2px 4px;
        color: #1e293b;
        font-weight: 500;
        border-radius: 3px;
      }
      .edge-picker-panel .edge-picker-row.active {
        font-weight: 700;
      }
      .edge-picker-panel .edge-picker-row:hover,
      .edge-picker-panel .edge-picker-row:focus {
        background: #f1f5f9;
        outline: none;
      }
      .edge-picker-panel .edge-picker-prefix {
        font-size: 11px;
        opacity: 0.7;
      }
      .edge-picker-panel .edge-picker-main {
        font-size: 12px;
      }
      /* Cross-crate boundary cue: the crate name segment renders in
         violet-600 so it stands apart from the blue function name and
         the dim module prefix. Same hue as the `mut` borrow flavor so
         the "crosses something" cues stay coherent across the UI. */
      .edge-picker-panel .edge-picker-crate {
        font-size: 11px;
        color: #7c3aed;
      }
      /* Top-row toolbar above the per-edge rows. Bulk show-all /
         hide-all buttons sit here so the user can flip every arrow in
         one click without going row-by-row. Visually separated from
         the rows by a thin slate underline so the toolbar reads as a
         distinct affordance, not another picker entry. */
      .edge-picker-panel .edge-picker-toolbar {
        display: flex;
        gap: 6px;
        padding-bottom: 6px;
        margin-bottom: 4px;
        border-bottom: 1px solid #e2e8f0;
      }
      .edge-picker-panel .edge-picker-btn {
        flex: 1;
        font: inherit;
        font-size: 11px;
        padding: 2px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 3px;
        background: #f8fafc;
        color: #475569;
        cursor: pointer;
      }
      .edge-picker-panel .edge-picker-btn:hover {
        background: #e2e8f0;
        color: #1e293b;
      }
      .edge-picker-panel .edge-picker-btn:focus {
        outline: 2px solid #93c5fd;
        outline-offset: 1px;
      }

      .arrow-disambig-panel {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 0 12px 8px 12px;
        font-size: 12px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1e293b;
        box-shadow: 0 4px 16px rgba(15, 23, 42, 0.12);
        min-width: 320px;
        max-width: min(680px, calc(100vw - 16px));
        max-height: 360px;
        overflow-y: auto;
      }
      .arrow-disambig-panel .header {
        position: sticky;
        top: 0;
        background: rgba(255, 255, 255, 0.96);
        margin: 0 -12px 4px -12px;
        padding: 8px 12px 4px 12px;
        border-bottom: 1px solid #f1f5f9;
      }
      .arrow-disambig-panel .header .title {
        font-weight: 600;
        color: #475569;
        font-size: 11px;
        letter-spacing: 0.02em;
      }
      .arrow-disambig-panel ul.arrow-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .arrow-disambig-panel li.arrow-row {
        padding: 7px 8px;
        display: flex;
        flex-direction: column;
        border-radius: 3px;
      }
      .arrow-disambig-panel li.arrow-row .arrow-route {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .arrow-disambig-panel li.arrow-row .arrow-endpoint {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        line-height: 1.25;
        overflow-wrap: anywhere;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 3px;
        transition: background-color 80ms;
      }
      .arrow-disambig-panel li.arrow-row .arrow-endpoint:hover,
      .arrow-disambig-panel li.arrow-row .arrow-endpoint:focus {
        background: rgba(59, 130, 246, 0.12);
        outline: none;
      }
      .arrow-disambig-panel li.arrow-row .arrow-endpoint.source {
        color: #c2410c;
      }
      .arrow-disambig-panel li.arrow-row .arrow-endpoint.target {
        padding-left: 18px;
        color: #2563eb;
      }
      .arrow-disambig-panel li.arrow-row .route-arrow {
        margin-right: 6px;
        color: #64748b;
        font-size: 13px;
        font-weight: 700;
      }
      .arrow-disambig-panel li.arrow-row .path-prefix {
        font-size: 11px;
        font-weight: 500;
        opacity: 0.78;
      }
      .arrow-disambig-panel li.arrow-row .path-main {
        font-weight: 600;
        font-size: 12px;
      }
      /* Cross-crate accent — only present on endpoint rows whose crate
         differs from the row's anchor crate. Violet-600 so it pops
         against the slate prefix and dark-grey main label. */
      .arrow-disambig-panel li.arrow-row .path-crate {
        font-size: 11px;
        font-weight: 600;
        color: #7c3aed;
      }
      /* Hover-only diagnostics for callable rows. This exposes the exact call
         facts already attached to the row, so confusing header-routed arrows
         can be explained without adding a second diagnostic data path. */
      #callable-debug {
        position: fixed;
        display: none;
        pointer-events: auto;
        z-index: 23;
        box-sizing: border-box;
        max-width: min(560px, calc(100vw - 16px));
        max-height: min(560px, calc(100vh - 16px));
        overflow-y: auto;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.16);
        color: #1e293b;
        font-size: 12px;
        line-height: 1.35;
      }
      #callable-debug .cd-kicker,
      #callable-debug .cd-section-title {
        color: #64748b;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #callable-debug .cd-title {
        margin-top: 1px;
        font-size: 14px;
        font-weight: 700;
        color: #1e293b;
      }
      #callable-debug .cd-path,
      #callable-debug .cd-value,
      #callable-debug .cd-line,
      #callable-debug .cd-call-meta,
      #callable-debug .cd-call-origin {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #callable-debug .cd-path {
        color: #64748b;
        font-size: 10px;
        margin-bottom: 8px;
      }
      #callable-debug .cd-grid {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 3px 10px;
        margin-bottom: 8px;
      }
      #callable-debug .cd-key {
        color: #94a3b8;
      }
      #callable-debug .cd-value {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #334155;
      }
      #callable-debug .cd-section-title {
        margin-top: 8px;
        padding-top: 7px;
        border-top: 1px solid #e2e8f0;
      }
      #callable-debug .cd-list {
        margin-top: 4px;
      }
      #callable-debug .cd-line,
      #callable-debug .cd-call {
        padding: 3px 0;
      }
      #callable-debug .cd-call + .cd-call,
      #callable-debug .cd-line + .cd-line {
        border-top: 1px solid #f1f5f9;
      }
      #callable-debug .cd-call-main {
        font-weight: 600;
        color: #334155;
      }
      #callable-debug .cd-call-meta,
      #callable-debug .cd-call-origin,
      #callable-debug .cd-empty,
      #callable-debug .cd-more {
        color: #64748b;
        font-size: 10px;
      }
      /* Diagram selection: glowing purple ring around the selected
         type. The ring rect is invisible by default so unselected
         types pay no visual cost. */
      .type-box .selection-ring {
        stroke: transparent;
        stroke-width: 0;
        fill: none;
        transition: stroke 120ms ease, filter 120ms ease;
      }
      .type-box.selected .selection-ring {
        stroke: #9333ea;
        stroke-width: 1.75;
        stroke-dasharray: 3 2;
        filter: drop-shadow(0 0 3px rgba(147, 51, 234, 0.55))
          drop-shadow(0 0 1px rgba(147, 51, 234, 1));
      }
      /* Member selection: highlighter band across the selected row.
         Rect spans the full type-box width in the renderer; the
         gradient handles the fade so both ends taper into the
         canvas. `mix-blend-mode: multiply` keeps the row text and
         row colors readable underneath. */
      .field-row-g .member-bg {
        fill: transparent;
      }
      .field-row-g.selected-member .member-bg {
        fill: url(#member-highlight-fade);
        mix-blend-mode: multiply;
      }

      /* Top-center tour bar: shows the active tour's title with a
         dropdown chevron + play/stop. Halo animation runs briefly
         when a fresh tour arrives via SSE. */
      #tour-bar {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 6px 4px 10px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.14);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        color: #1e293b;
        max-width: 60vw;
      }
      #tour-bar[hidden] { display: none; }
      .tour-bar-title {
        background: transparent;
        border: none;
        font: inherit;
        color: inherit;
        cursor: pointer;
        padding: 4px 8px;
        max-width: 50vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-radius: 999px;
      }
      .tour-bar-title:hover { background: #f1f5f9; }
      .tour-bar-play {
        /* Idle = "play": green button, white triangle. The is-playing
           class flips to red so the button reads as "stop" without
           the user having to inspect the glyph. */
        background: #16a34a;
        color: #fff;
        border: none;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        cursor: pointer;
        /* Flex-center the inline SVG icon. Unicode glyphs (▶ / ■)
           have asymmetric sidebearings that made earlier versions
           look off-centre in the circular button. */
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .tour-bar-play:hover { background: #15803d; }
      .tour-bar-play.is-playing { background: #dc2626; }
      .tour-bar-play.is-playing:hover { background: #b91c1c; }
      .tour-bar-play svg {
        display: block;
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      /* Halo for a freshly arrived tour.
         Two box-shadow glows offset to the bar's left and right,
         each a different colour. Keyframes cycle the pair through
         the rainbow so the eye sees a left-to-right colour drift:
         (red→orange), (orange→green), (green→blue), (blue→purple),
         (purple→red), repeat. The bar's white background hides the
         inside half of each shadow; only an outer glow remains.

         Tight offsets (±50px) keep the halo hugging the bar instead
         of bleeding across the page. Fully opaque colour and a
         negative spread (-14px) make the alert read clearly without
         washing out into the page background. */
      @keyframes tour-bar-halo {
        0%   { box-shadow: -50px 0 28px -14px rgba(239,  68,  68, 1), 50px 0 28px -14px rgba(249, 115,  22, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
        20%  { box-shadow: -50px 0 28px -14px rgba(249, 115,  22, 1), 50px 0 28px -14px rgba( 34, 197,  94, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
        40%  { box-shadow: -50px 0 28px -14px rgba( 34, 197,  94, 1), 50px 0 28px -14px rgba( 59, 130, 246, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
        60%  { box-shadow: -50px 0 28px -14px rgba( 59, 130, 246, 1), 50px 0 28px -14px rgba(168,  85, 247, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
        80%  { box-shadow: -50px 0 28px -14px rgba(168,  85, 247, 1), 50px 0 28px -14px rgba(239,  68,  68, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
        100% { box-shadow: -50px 0 28px -14px rgba(239,  68,  68, 1), 50px 0 28px -14px rgba(249, 115,  22, 1), 0 6px 18px rgba(15, 23, 42, 0.14); }
      }
      #tour-bar.is-new {
        /* Linear timing so each colour pair takes the same wall-clock
           time; ease-in-out would make the middle pairs feel faster.
           10s = brisk enough to feel alive without being frantic. */
        animation: tour-bar-halo 10s linear infinite;
      }
      .tour-bar-menu {
        position: fixed;
        z-index: 31;
        min-width: 240px;
        max-height: 60vh;
        overflow: auto;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        padding: 4px 0;
        font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .tour-bar-menu-row {
        padding: 6px 12px;
        cursor: pointer;
        white-space: nowrap;
        color: #1e293b;
      }
      .tour-bar-menu-row:hover { background: #f1f5f9; }
      .tour-bar-menu-row.is-active { background: #ede9fe; font-weight: 600; }

      /* Yellow sticky-note tour bubble. Position is fixed so the
         note floats above the canvas, with a CSS triangle "pointer"
         on one of the four sides aimed at the focused element. */
      .tour-bubble {
        position: fixed;
        z-index: 35;
        min-width: 240px;
        max-width: 360px;
        background: #fef9c3;
        border: 1px solid #eab308;
        border-radius: 4px;
        padding: 12px 14px 10px 14px;
        box-shadow: 4px 6px 16px rgba(15, 23, 42, 0.22);
        font: 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1e293b;
        cursor: move;
        user-select: none;
        transform: rotate(-0.4deg);
      }
      .tour-bubble-body {
        line-height: 1.45;
        margin-bottom: 8px;
      }
      /* Compact markdown rendering inside the sticky note. Margins
         on first/last children are zeroed so paragraphs sit flush
         against the bubble's top/bottom padding. */
      .tour-bubble-body p {
        margin: 0 0 6px 0;
      }
      .tour-bubble-body > :first-child { margin-top: 0; }
      .tour-bubble-body > :last-child { margin-bottom: 0; }
      .tour-bubble-body code {
        background: rgba(146, 64, 14, 0.12);
        padding: 0 4px;
        border-radius: 3px;
        font: 0.92em ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .tour-bubble-body pre {
        background: rgba(146, 64, 14, 0.1);
        padding: 6px 8px;
        border-radius: 4px;
        overflow-x: auto;
        font: 0.92em ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 0 0 6px 0;
      }
      .tour-bubble-body pre code {
        background: transparent;
        padding: 0;
      }
      .tour-bubble-body ul,
      .tour-bubble-body ol {
        margin: 0 0 6px 0;
        padding-left: 1.2em;
      }
      .tour-bubble-body li { margin-bottom: 2px; }
      .tour-bubble-body a {
        color: #7e22ce;
        text-decoration: underline;
      }
      .tour-bubble-body a:hover { color: #6b21a8; }
      .tour-bubble-body strong { font-weight: 700; }
      .tour-bubble-body em { font-style: italic; }
      .tour-bubble-footer {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tour-bubble-footer button {
        font: inherit;
        padding: 3px 8px;
        border-radius: 3px;
        border: 1px solid #ca8a04;
        background: #fde68a;
        color: #1e293b;
        cursor: pointer;
      }
      .tour-bubble-footer button[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .tour-bubble-footer button:not([disabled]):hover {
        background: #fcd34d;
      }
      .tour-bubble-counter {
        margin-left: auto;
        color: #78716c;
        font-size: 11px;
      }
      /* SVG tail that stretches from the bubble's edge to a point on
         the focused element's bounding box. Updated per rAF frame
         by the bubble component; covers the viewport so polygon
         coordinates can use raw screen pixels. Sits just under the
         bubble in z order so the body draws on top. */
      .tour-bubble-tail-svg {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 34;
        pointer-events: none;
      }
      .tour-bubble-tail {
        fill: none;
        stroke: #eab308;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.9;
      }
    </style>

  </head>
  <body>
    <main>
      <!-- Left pane: the diagram (canvas + HTML module overlay) plus
           any controls that should anchor to the diagram's region.
           The code panel below is a flex sibling that sits to the
           right; opening it shrinks this pane via flexbox. -->
      <div id="viewer-left">
        <div id="canvas-scroll">
          <div id="canvas-content">
            <svg id="tree" role="img" aria-label="module and type tree"></svg>
            <div id="html-modules"></div>
          </div>
        </div>
        <div id="error" class="error" hidden></div>

        <button id="recenter-btn" hidden type="button" aria-label="Back to content">
          <span class="recenter-icon" aria-hidden="true">⟲</span>
          <span>Back to content</span>
        </button>
        <!-- Overlay cluster — minimap, settings (hamburger), legend +
             shortcuts (?). Lives inside `#viewer-left` and uses
             `position: absolute` so its right edge tracks the
             splitter when the code panel opens, instead of running
             off behind the panel. -->
        <div id="top-controls" aria-label="viewer controls">
          <select id="crate" aria-label="crate"></select>
          <div id="minimap" aria-label="diagram minimap">
            <button
              type="button"
              class="minimap-toggle"
              aria-expanded="true"
              aria-controls="minimap-body"
              title="Toggle minimap"
            >
              <span>map</span>
              <span class="minimap-caret" aria-hidden="true">▾</span>
            </button>
            <div class="minimap-body" id="minimap-body" title="Click or drag to pan">
              <svg aria-hidden="true" focusable="false"></svg>
            </div>
          </div>
          <div id="settings" aria-label="settings">
            <button
              type="button"
              class="settings-toggle"
              aria-expanded="false"
              aria-controls="settings-body"
              title="Toggle settings"
            >
              ☰
            </button>
            <div class="settings-body" id="settings-body" hidden>
              <label class="settings-row">
                <input id="settings-trackpad-mode" type="checkbox" />
                <span>trackpad mode</span>
              </label>
              <label class="settings-row" title="Show layout obstacle rectangles and placement grid">
                <input id="settings-debug-layout" type="checkbox" />
                <span>debug overlay</span>
              </label>
              <div class="settings-summary" id="settings-input-summary"></div>
              <div class="settings-default" id="settings-input-default"></div>
            </div>
          </div>
          <div id="keyhints" aria-label="keybindings">
            <button
              type="button"
              class="keyhints-toggle"
              aria-expanded="false"
              aria-controls="keyhints-body"
              title="Toggle legend & shortcuts"
            >
              ?
            </button>
            <div class="keyhints-body" id="keyhints-body" hidden>
              <div class="legend" aria-label="legend">
                <div class="legend-col" aria-label="arrow legend">
                  <div class="legend-row">
                    <svg class="legend-arrow" viewBox="0 0 36 10" preserveAspectRatio="xMidYMid meet">
                      <line
                        x1="2"
                        y1="5"
                        x2="28"
                        y2="5"
                        stroke="#94a3b8"
                        stroke-width="1"
                        marker-end="url(#legend-arrow-marker)"
                      />
                    </svg>
                    <span>canonical</span>
                  </div>
                  <div class="legend-row">
                    <svg class="legend-arrow" viewBox="0 0 36 10" preserveAspectRatio="xMidYMid meet">
                      <line
                        x1="2"
                        y1="5"
                        x2="28"
                        y2="5"
                        stroke="#3b82f6"
                        stroke-width="1"
                        marker-end="url(#legend-arrow-marker)"
                      />
                    </svg>
                    <span>selected</span>
                  </div>
                  <div class="legend-row">
                    <svg class="legend-arrow" viewBox="0 0 36 10" preserveAspectRatio="xMidYMid meet">
                      <line
                        x1="2"
                        y1="5"
                        x2="28"
                        y2="5"
                        stroke="#f59e0b"
                        stroke-width="1"
                        marker-end="url(#legend-arrow-marker)"
                      />
                    </svg>
                    <span>drift_below</span>
                  </div>
                  <div class="legend-row">
                    <svg class="legend-arrow" viewBox="0 0 36 10" preserveAspectRatio="xMidYMid meet">
                      <line
                        x1="2"
                        y1="5"
                        x2="28"
                        y2="5"
                        stroke="#ef4444"
                        stroke-width="1"
                        marker-end="url(#legend-arrow-marker)"
                      />
                    </svg>
                    <span>drift_above</span>
                  </div>
                </div>
                <div class="legend-col" aria-label="visibility legend">
                  <div class="legend-row">
                    <span class="legend-dot" style="background:#ef4444"></span>
                    <span>pub</span>
                  </div>
                  <div class="legend-row">
                    <span class="legend-dot" style="background:#22c55e"></span>
                    <span>pub(crate)</span>
                  </div>
                  <div class="legend-row">
                    <span class="legend-dot" style="background:#3b82f6"></span>
                    <span>pub(super)</span>
                  </div>
                  <div class="legend-row">
                    <span class="legend-dot" style="background:#f97316"></span>
                    <span>pub(in path)</span>
                  </div>
                  <div class="legend-row">
                    <span class="legend-dot" style="background:#94a3b8"></span>
                    <span>local</span>
                  </div>
                </div>
              </div>
              <div class="chips">
                <div class="row" id="hint-focus"><kbd>F</kbd><span>focus</span></div>
                <div class="row" id="hint-methods" title="Show or hide the per-type method buckets"><kbd>M</kbd><span>methods</span></div>
                <div class="row" id="hint-code" title="Show or hide the source code panel"><kbd>C</kbd><span>code</span></div>
                <div class="row" id="hint-scale" title="Reset zoom to 100%"><kbd>S</kbd><span>scale</span><span id="scale-value">100%</span></div>
                <div class="row" id="hint-reset" title="Reset everything"><kbd>R</kbd><span>reset</span></div>
                <div class="row" id="hint-overview" title="Toggle fit-all overview / 100% at cursor"><kbd>Space</kbd><span>overview</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Right-docked code panel. Cmd/Ctrl+click on a diagram element
           opens it to that element's source span; the host wires
           showing/hiding and click-to-navigate in main.ts. The single
           remaining resize handle acts as the splitter between the
           diagram pane and this one. -->
      <aside id="code-panel" hidden role="complementary" aria-label="Source code">
        <div class="code-panel-header">
          <span class="code-panel-title">source</span>
          <button class="code-panel-close" type="button" aria-label="Close code panel">×</button>
        </div>
        <pre class="code-panel-body"></pre>
        <div class="code-panel-resize code-panel-resize-l" aria-hidden="true"></div>
      </aside>
    </main>
    <!-- Hidden SVG defs reachable from any inline SVG on the page —
         shared marker for the legend arrows. Same shape as the graph's
         markers; fill="context-stroke" makes the arrowhead track each
         line's stroke colour automatically. -->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute" focusable="false">
      <defs>
        <!-- Highlighter mark gradient: solid orange in the middle,
             fading to transparent at both horizontal ends.
             `gradientUnits="objectBoundingBox"` lets the rect stretch
             across any width and the fade ramps follow automatically. -->
        <linearGradient id="member-highlight-fade" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0" />
          <stop offset="12%" stop-color="#c4b5fd" stop-opacity="0.65" />
          <stop offset="88%" stop-color="#c4b5fd" stop-opacity="0.65" />
          <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0" />
        </linearGradient>
        <!-- markerUnits="userSpaceOnUse" pins the arrowhead size to a
             constant 8×8 in user-space, regardless of line stroke width. -->
        <marker
          id="legend-arrow-marker"
          viewBox="0 -4 8 8"
          refX="7"
          refY="0"
          markerUnits="userSpaceOnUse"
          markerWidth="8"
          markerHeight="8"
          orient="auto"
        >
          <path d="M0,-4L8,0L0,4Z" fill="context-stroke" />
        </marker>
      </defs>
    </svg>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
