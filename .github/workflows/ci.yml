# PR + main-branch test pipeline.
#
# Runs on every push to main and every pull request.
#
# Job layout:
#   - rust-test: cargo test on ubuntu + windows + macOS. The matrix
#     exists specifically because behavior diverges per OS: the
#     working-tree watcher uses a different `notify` backend on each
#     (inotify / ReadDirectoryChangesW / FSEvents), and path handling
#     (separators, canonicalize's UNC form) is platform-sensitive. A
#     single-OS run cannot prove the watcher or `live_reload` test
#     behaves everywhere — a Linux-only inotify race already slipped
#     through once when this was ubuntu-only.
#   - lint: cargo fmt + clippy. Platform-independent, so ubuntu-only.
#   - viewer: vitest. Pure JS, so ubuntu-only.
#
# The heavy release cross-compile matrix lives in release.yml and only
# fires on tag pushes.
#
# Cached: cargo target (per-OS via rust-cache), viewer node_modules.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Force every JavaScript action to Node 24 — matches release.yml.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  rust-test:
    name: rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # See all platforms' results rather than cancelling siblings on
      # the first failure — a platform-specific break is the whole
      # reason this matrix exists.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # rust-cache keys on the runner OS automatically, so each matrix
      # leg gets its own cache.
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        # build.rs runs `npm install && npm run build` in viewer/ to
        # bake viewer/dist into the binary via include_dir!. Without
        # Node on the runner, every cargo command fails at the build
        # script.
        with:
          node-version: '20'
      - name: cargo test
        run: cargo test --all-targets

  lint:
    name: rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        # Run clippy as informational for now — the codebase has a
        # handful of pre-existing warnings we haven't audited. Once
        # those are cleaned up, tighten to `-- -D warnings` so any
        # new lint regression breaks the build.
        run: cargo clippy --all-targets

  viewer:
    name: viewer test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npm test

  viewer-e2e:
    # Tier-3 end-to-end: spawns the real `mind-expander view` server
    # against e2e/fixture-workspace and drives a real Chromium, so it is
    # its own job (needs the Rust binary built + a browser) rather than
    # part of the fast `viewer test` gate. Asserts real-font geometry
    # invariants the node/jsdom suites can't see.
    name: viewer e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: viewer/package-lock.json
      # Debug build is enough and faster than release; the e2e harness
      # finds it at ../target/debug/mind-expander by default.
      - name: build mind-expander
        run: cargo build
      - name: npm ci
        working-directory: viewer
        run: npm ci
      - name: install Chromium
        working-directory: viewer
        run: npx playwright install --with-deps chromium
      - name: playwright e2e
        working-directory: viewer
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        # Failure-only screenshots/traces for debugging a red run.
        if: failure()
        with:
          name: playwright-report
          path: viewer/playwright-report/
          retention-days: 7
